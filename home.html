<script>
    const srchBar = document.getElementById('searchbar');
    const filtButtons = document.querySelectorAll('.filtBtn');
    const alCards = document.querySelectorAll('.cardItem');

    let selectedCategory = 'all';

    function applyFilter() {
        const srchText = srchBar.value.toLowerCase();

        alCards.forEach(card => {
            const cardCategory = card.getAttribute('data-category');
            const cardTitle = card.querySelector('h1').textContent.toLowerCase();

            const categoryMatch = (selectedCategory === 'all' || cardCategory === selectedCategory);
            const searchMatch = cardTitle.includes(srchText);

            if (categoryMatch && searchMatch) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    }

    srchBar.addEventListener('input', applyFilter);

    filtButtons.forEach(button => {
        button.addEventListener('click', () => {
            selectedCategory = button.getAttribute('data-filter');
            applyFilter();
        });
    });
</script>
